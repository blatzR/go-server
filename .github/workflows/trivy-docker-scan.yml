name: Build and Scan Docker Image

on:
  # push:
  #   branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: hello-world-go
  IMAGE_TAG: ${{ github.sha }}
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: hello-world-go
  S3_REPORT_BUCKET: trivy-image-scan-report

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Download Trivy HTML template
        run: |
          mkdir -p contrib
          curl -sSL -o contrib/html.tpl https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl

      - name: Run Trivy scan (HTML report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: 'template'
          template: '@contrib/html.tpl'
          output: 'trivy-report.html'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Convert Trivy report to PDF
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf
          wkhtmltopdf trivy-report.html trivy-report.pdf

      - name: Upload Trivy PDF report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.pdf
          retention-days: 30
          
      # Configured early (with `if: always()` below) so the S3 report upload can run
      # even when the Trivy gate above fails - only the ECR push depends on it passing.
      - name: Configure AWS credentials
        # if: always() && github.event_name == 'pull_request' && github.base_ref == 'main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Reuses the PDF produced earlier by the "Convert Trivy report to PDF" step -
      # no re-scan needed. Runs regardless of the gate's outcome, so failed scans
      # are still archived for review.
      # - name: Upload Trivy report to S3
      #   # if: always() && github.event_name == 'pull_request' && github.base_ref == 'main'
      #   run: |
      #     aws s3 cp trivy-report.pdf "s3://${{ env.S3_REPORT_BUCKET }}/${{ env.ECR_REPOSITORY }}/${{ env.IMAGE_TAG }}.pdf"

      # # Reuses the PDF produced earlier by the "Convert Trivy report to PDF" step -
      # # no re-scan needed. Runs regardless of the gate's outcome, so failed scans
      # # are still archived for review.
      - name: Upload Trivy report to S3
        if: always() && github.event_name == 'pull_request' && github.base_ref == 'main'
        id: s3-upload
        run: |
          S3_KEY="${{ env.ECR_REPOSITORY }}/${{ env.IMAGE_TAG }}.pdf"
          aws s3 cp trivy-report.pdf "s3://${{ env.S3_REPORT_BUCKET }}/$S3_KEY"
          REPORT_URL=$(aws s3 presign "s3://${{ env.S3_REPORT_BUCKET }}/$S3_KEY" --expires-in 604800)
          echo "report_url=$REPORT_URL" >> "$GITHUB_OUTPUT"

      - name: Comment Trivy report link on PR
        if: always() && github.event_name == 'pull_request' && github.base_ref == 'main' && steps.s3-upload.outcome == 'success'
        run: gh pr comment "$PR_NUMBER" --body "Report - $REPORT_URL"
        env:
          REPORT_URL: ${{ steps.s3-upload.outputs.report_url }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Run Trivy scan (fail build on fixable HIGH/CRITICAL)
        id: trivy-gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'

      
      # --- Everything below only runs on PRs targeting main, and only if the Trivy gate above passed ---

      - name: Login to Amazon ECR
        if: github.event_name == 'pull_request' && github.base_ref == 'main' && steps.trivy-gate.outcome == 'success'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        if: github.event_name == 'pull_request' && github.base_ref == 'main' && steps.trivy-gate.outcome == 'success'
        run: |
          aws ecr describe-repositories --repository-names "${{ env.ECR_REPOSITORY }}" --region "${{ env.AWS_REGION }}" \
            || aws ecr create-repository --repository-name "${{ env.ECR_REPOSITORY }}" --region "${{ env.AWS_REGION }}"

      - name: Tag and push image to Amazon ECR
        if: github.event_name == 'pull_request' && github.base_ref == 'main' && steps.trivy-gate.outcome == 'success'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

